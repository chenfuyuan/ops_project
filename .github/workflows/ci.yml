name: ci

on:
  push:
  pull_request:

jobs:
  static-and-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev --group test
      - name: Ruff check
        run: uv run ruff check app tests
      - name: Architecture checks
        run: uv run python -m unittest discover -s tests/architecture

  test-suite:
    runs-on: ubuntu-latest
    needs: static-and-structure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev --group test
      - name: Unit tests
        run: uv run python -m unittest discover -s tests/unit

  runtime-validation:
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev --group test
      - name: Runtime validation
        run: uv run python -m unittest discover -s tests/integration
