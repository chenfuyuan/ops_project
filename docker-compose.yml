services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PERSON_UP_APP_ENV: local
      PERSON_UP_REDIS_URL: redis://redis:6379/0
      PERSON_UP_CELERY_BROKER_URL: redis://redis:6379/0
      PERSON_UP_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "celery", "-A", "app.worker:app", "worker", "--loglevel=info"]
    environment:
      PERSON_UP_APP_ENV: local
      PERSON_UP_REDIS_URL: redis://redis:6379/0
      PERSON_UP_CELERY_BROKER_URL: redis://redis:6379/0
      PERSON_UP_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
